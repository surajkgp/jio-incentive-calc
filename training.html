<!-- VERSION C33.2 – Training Hub (YouTube Auto Thumbnail + Asset Thumbnails + Search + JSON Feed + Bottom Switcher via switcher.html) -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jio Retailer – Training Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --deepBlue:#002d62;
      --btnBlue1:#005eff;
      --btnBlue2:#003bba;

      --text:#202124;
      --sub:#5f6368;
      --border:#dadce0;
      --bg:#ffffff;

      --cardBg:#f7fafc;
      --cardBorder:#eef2f6;

      --shadow: 0 1px 2px rgba(0,0,0,0.10);

      /* ✅ Switcher fixed tabs */
      --tabH: 72px;
    }

    *{
      box-sizing: border-box;
      font-family: Inter, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body{
      margin: 0;
      background: var(--bg);
      color: var(--text);
      overflow-y: auto;
    }

    .page{
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 14px 14px 18px;
      padding-bottom: calc(var(--tabH) + 18px); /* ✅ prevents content hiding behind tabs */
    }

    /* ===== Header ===== */
    .header{
      padding: 10px 0 8px;
      text-align: center;
    }

    .title{
      margin: 0;
      font-size: 26px;
      font-weight: 900;
      color: var(--deepBlue);
      letter-spacing: -0.6px;
      line-height: 1.1;
    }

    .subtitle{
      margin: 8px auto 0;
      font-size: 13px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.35;
      max-width: 520px;
    }

    /* ===== Search ===== */
    .search-wrap{
      margin-top: 12px;
      display: flex;
      justify-content: center;
    }

    .search{
      width: 100%;
      max-width: 520px;
      height: 44px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #f8f9fa;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      color: var(--text);
    }

    .search:focus{
      border-color: var(--btnBlue1);
      box-shadow: 0 0 0 3px rgba(0,94,255,0.14);
      background: #ffffff;
    }

    /* ===== Grid ===== */
    .grid{
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .tile{
      background: var(--cardBg);
      border: 1px solid var(--cardBorder);
      border-radius: 16px;
      padding: 12px 12px;
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 12px;
      align-items: center;
      box-shadow: 0 10px 22px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .tile:active{
      transform: scale(0.99);
    }

    .thumb{
      width: 84px;
      height: 64px;
      border-radius: 12px;
      background: #ffffff;
      border: 1px solid #e9eef3;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-fallback{
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: #ffffff;
    }

    .tile-right{
      min-width: 0;
    }

    .tile-title{
      font-size: 15px;
      font-weight: 900;
      color: #0f172a;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tile-tagrow{
      margin-top: 6px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill{
      font-size: 11px;
      font-weight: 900;
      color: var(--btnBlue2);
      background: rgba(0, 94, 255, 0.10);
      border: 1px solid rgba(0, 94, 255, 0.18);
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .pill.new{
      color: #0f5132;
      background: rgba(34,197,94,0.12);
      border-color: rgba(34,197,94,0.18);
    }

    .empty-state{
      background: #ffffff;
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 14px 12px;
      text-align: center;
      color: var(--sub);
      font-size: 12.5px;
      font-weight: 700;
    }

    .footer-note{
      margin-top: 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--sub);
      line-height: 1.35;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="page">
  <div class="header">
    <h1 class="title">Learn & Earn</h1>
    <div class="subtitle">
      Watch videos, & step-by-step guides to help you sell more and earn more
    </div>

    <div class="search-wrap">
      <input id="searchInput" class="search" type="text" placeholder="Search training (video / PDF / scheme)...">
    </div>
  </div>

  <div id="itemsGrid" class="grid"></div>

  <div class="footer-note">
    *Training links are for reference. Open links in your browser for best experience.
  </div>
</div>

<!-- ✅ Switcher Mount -->
<div id="switcherMount"></div>

<script>
  // ===== Helpers =====
  function normalizeText(t){
    return (t || "").toLowerCase().trim();
  }

  function isYouTube(url){
    return /youtube\.com|youtu\.be/i.test(url || "");
  }

  function getYouTubeId(url){
    try{
      // shorts
      let m = url.match(/youtube\.com\/shorts\/([^?&#/]+)/i);
      if (m && m[1]) return m[1];

      // watch?v=
      m = url.match(/[?&]v=([^?&#]+)/i);
      if (m && m[1]) return m[1];

      // youtu.be/
      m = url.match(/youtu\.be\/([^?&#/]+)/i);
      if (m && m[1]) return m[1];

      return "";
    }catch(e){
      return "";
    }
  }

  // ✅ NEW: supports both YouTube auto thumbnail + user uploaded asset thumb
  function getThumbnail(item){
    const url = item.url || "";

    // ✅ 1) YouTube auto thumbnail
    if (isYouTube(url)) {
      const id = getYouTubeId(url);
      if (id) return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    }

    // ✅ 2) Non-YouTube: use uploaded thumb from JSON (asset)
    // Example: "thumb": "thumbs/scheme.jpg"
    if (item.thumb && typeof item.thumb === "string" && item.thumb.trim() !== "") {
      return item.thumb.trim();
    }

    // ✅ fallback
    return "";
  }

  function openItem(url){
    if (!url) return;
    window.open(url, "_blank", "noopener,noreferrer");
  }

  function escapeHtml(str){
    return String(str || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function renderTile(item){
    const thumb = getThumbnail(item);
    const tag = item.tag || (item.type === "video" ? "Video Guide" : "Document (PDF)");
    const isNew = (item.isNew === true);

    // ✅ safe inline onclick url escaping
    const safeUrl = (item.url || "").replace(/'/g, "\\'");

    return `
      <div class="tile" onclick="openItem('${safeUrl}')">
        <div class="thumb">
          ${
            thumb
              ? `<img src="${escapeHtml(thumb)}" alt="thumb"
                    onerror="this.style.display='none'; this.parentNode.innerHTML='<div class=\\'thumb-fallback\\'>${item.type === "video" ? "VIDEO" : "DOC"}</div>';">`
              : `<div class="thumb-fallback">${item.type === "video" ? "VIDEO" : "DOC"}</div>`
          }
        </div>

        <div class="tile-right">
          <div class="tile-title">${escapeHtml(item.title || "Untitled")}</div>

          <div class="tile-tagrow">
            <span class="pill">${escapeHtml(tag)}</span>
            ${isNew ? `<span class="pill new">New / Updated</span>` : ""}
          </div>
        </div>
      </div>
    `;
  }

  // ===== Load JSON =====
  let allItems = [];

  async function loadTrainingData(){
    const grid = document.getElementById("itemsGrid");
    grid.innerHTML = `<div class="empty-state">Loading training items...</div>`;

    try{
      const res = await fetch("training.json", { cache: "no-store" });
      const data = await res.json();

      allItems = Array.isArray(data.items) ? data.items : [];

      if (allItems.length === 0){
        grid.innerHTML = `<div class="empty-state">No training items found.</div>`;
        return;
      }

      renderList(allItems);
    } catch(e){
      grid.innerHTML = `<div class="empty-state">Unable to load training.json. Please check file name/path.</div>`;
    }
  }

  function renderList(items){
    const grid = document.getElementById("itemsGrid");

    if (!items || items.length === 0){
      grid.innerHTML = `<div class="empty-state">No matching results.</div>`;
      return;
    }

    grid.innerHTML = items.map(renderTile).join("");
  }

  // ===== Search =====
  document.getElementById("searchInput").addEventListener("input", (e) => {
    const q = normalizeText(e.target.value);

    if (!q){
      renderList(allItems);
      return;
    }

    const filtered = allItems.filter(it => {
      const t = normalizeText(it.title);
      const tag = normalizeText(it.tag);
      const url = normalizeText(it.url);
      return t.includes(q) || tag.includes(q) || url.includes(q);
    });

    renderList(filtered);
  });

  loadTrainingData();
</script>

<script>
  // ✅ Load switcher.html
  fetch("switcher.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("switcherMount").innerHTML = html;

      // ✅ RUN active tab logic after injection
      const path = window.location.pathname.toLowerCase();
      let active = "calculator";

      if (path.includes("training.html")) active = "training";
      else if (path.includes("reverse.html")) active = "reverse";
      else active = "calculator";

      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === active);
      });
    })
    .catch(() => {
      console.log("Switcher not loaded. Check switcher.html path.");
    });
</script>

</body>
</html>
