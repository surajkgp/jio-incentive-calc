<!-- switcher.html | Bottom Tab Switch (Commission / Goal / Learn) | Box ONLY for active tab -->
<style>
  :root{
    --deepBlue:#002d62;
    --btnBlue1:#005eff;
    --btnBlue2:#003bba;

    --muted:#6b7280;
    --tabH: 72px;

    --iconBoxActiveBg: rgba(0, 45, 98, 0.13);
    --iconBoxActiveBorder: rgba(0, 45, 98, 0.22);

    --ripple: rgba(0, 45, 98, 0.20);
  }

  /* ✅ Prevent page content hidden behind fixed bottom tabs */
  body{
    padding-bottom: calc(var(--tabH) + 10px);
  }

  .bottom-tabs{
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: 0;

    width: 100%;
    max-width: 820px;
    height: var(--tabH);

    background: rgba(255,255,255,0.98);
    border-top: 1px solid #eef0f3;
    z-index: 9999;

    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;

    padding: 8px 10px 10px;
    backdrop-filter: blur(10px);
  }

  .tab-btn{
    border: none;
    background: transparent;
    cursor: pointer;
    width: 100%;
    height: 100%;

    display: flex;
    align-items: center;
    justify-content: center;

    -webkit-tap-highlight-color: transparent;
  }

  .tab-btn:active{
    transform: scale(0.99);
  }

  .tab-inner{
    width: 100%;
    max-width: 170px;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;

    padding: 2px 2px;
    color: var(--muted);
    transition: all 160ms ease;
  }

  /* ✅ Icon wrapper: NO BOX by default */
  .icon-box{
    width: 92px;
    height: 32px;
    border-radius: 30px;

    display: flex;
    align-items: center;
    justify-content: center;

    position: relative;
    overflow: hidden;

    /* ✅ No visible box for inactive */
    background: transparent;
    border: 1px solid transparent;
    box-shadow: none;

    transition: all 160ms ease;
  }

  .tab-ic{
    width: 22px;
    height: 22px;
    display: block;
    stroke: currentColor;
  }

  /* ✅ Bigger label */
  .tab-label{
    font-size: 12.5px;
    font-weight: 900;
    letter-spacing: 0.2px;
    color: inherit;
    line-height: 1.1;
  }

  /* ✅ Active page highlight ONLY */
  .tab-btn.active .tab-inner{
    color: var(--deepBlue);
  }

  .tab-btn.active .icon-box{
    background: var(--iconBoxActiveBg);
    border: 1px solid var(--iconBoxActiveBorder);
    box-shadow: 0 10px 22px rgba(0,45,98,0.14);
  }

  /* ✅ Ripple effect (only visible for active tab) */
  .icon-box::after{
    content:"";
    position:absolute;
    width: 48px;
    height: 10px;
    border-radius: 999px;
    background: var(--ripple);
    opacity: 0;
    transform: scale(1);
    pointer-events: none;
  }

  .tab-btn.active.ripple .icon-box::after{
    left: var(--rx);
    top: var(--ry);
    transform: translate(-50%, -50%) scale(1);
    opacity: 1;
    animation: rippleAnim 520ms ease-out forwards;
  }

  @keyframes rippleAnim{
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.35; }
    100% { transform: translate(-50%, -50%) scale(14); opacity: 0; }
  }
</style>

<div class="bottom-tabs" id="bottomTabs">

  <!-- ✅ 1) Commission -->
  <button class="tab-btn" data-tab="calculator" onclick="location.href='./index.html'" aria-label="Commission">
    <div class="tab-inner">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" class="tab-ic" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 7H6a3 3 0 0 0-3 3v7a3 3 0 0 0 3 3h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"></path>
          <path d="M16 3H6a3 3 0 0 0-3 3"></path>
          <path d="M17 13h.01"></path>
        </svg>
      </div>
      <div class="tab-label">Commission</div>
    </div>
  </button>

  <!-- ✅ 2) Goal -->
  <button class="tab-btn" data-tab="reverse" onclick="location.href='./reverse.html'" aria-label="Goal">
    <div class="tab-inner">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" class="tab-ic" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <circle cx="12" cy="12" r="6"></circle>
          <circle cx="12" cy="12" r="2"></circle>
        </svg>
      </div>
      <div class="tab-label">Goal</div>
    </div>
  </button>

  <!-- ✅ 3) Learn -->
  <button class="tab-btn" data-tab="training" onclick="location.href='./training.html'" aria-label="Learn">
    <div class="tab-inner">
      <div class="icon-box">
        <svg viewBox="0 0 24 24" class="tab-ic" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M10 8l6 4-6 4V8z"></path>
        </svg>
      </div>
      <div class="tab-label">Learn</div>
    </div>
  </button>

</div>

<script>
  // ✅ Highlight active tab by current page
  (function setActiveTab(){
    const path = window.location.pathname.toLowerCase();
    let active = "calculator";

    if (path.includes("training.html")) active = "training";
    else if (path.includes("reverse.html")) active = "reverse";
    else active = "calculator";

    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.tab === active);
    });
  })();

  // ✅ Ripple only for active tab
  (function rippleInit(){
    const buttons = document.querySelectorAll(".tab-btn");

    buttons.forEach(btn => {
      btn.addEventListener("click", (e) => {
        if (!btn.classList.contains("active")) return;

        const iconBox = btn.querySelector(".icon-box");
        if (!iconBox) return;

        const rect = iconBox.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        btn.style.setProperty("--rx", x + "px");
        btn.style.setProperty("--ry", y + "px");

        btn.classList.remove("ripple");
        void btn.offsetWidth;
        btn.classList.add("ripple");

        setTimeout(() => btn.classList.remove("ripple"), 520);
      }, { passive: true });
    });
  })();
</script>
