<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jio Retailer – Reverse Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#fff;
color:#202124;
}

.page{
max-width:820px;
margin:auto;
padding:14px 14px 90px;
}

.title{
text-align:center;
font-size:26px;
font-weight:900;
color:#002d62;
}

.subtitle{
text-align:center;
font-size:13px;
color:#5f6368;
}

/* ===== INPUT ===== */

.target-card{
text-align:center;
border:1px solid #eef0f3;
border-radius:18px;
padding:16px;
}

.target-input{
margin-top:10px;
width:220px;
height:56px;
font-size:32px;
font-weight:900;
text-align:center;
border-radius:16px;
border:1px solid #dadce0;
}

/* ===== CTA CENTER ===== */

.cta-wrapper{
display:flex;
justify-content:center;
width:100%;
margin-top:18px;
}

.btn-primary{
width:100%;
max-width:360px;
height:52px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:900;
color:#fff;
background:linear-gradient(90deg,#005eff,#003bba);
cursor:pointer;
}

/* ===== CARDS ===== */

.summary-card{
display:flex;
justify-content:space-between;
align-items:center;
background:#f7fafc;
border:1px solid #eef2f6;
border-radius:14px;
padding:12px;
margin-bottom:8px;
}

.card-title{
font-weight:800;
}

.card-sub{
font-size:11px;
color:#94a3b8;
}

.card-amount{
font-weight:900;
color:#002d62;
}

/* ===== SELL & WIN HIGHLIGHT ===== */

.bonus-card{
background:#ecfdf5;
border:1px solid #22c55e;
}

.bonus-card .card-title{
color:#15803d;
}

.bonus-card .card-amount{
color:#15803d;
font-size:16px;
}

/* ===== TOTAL HIGHLIGHT ===== */

.total-card{
background:linear-gradient(90deg,#005eff,#003bba);
border:none;
}

.total-card .card-title,
.total-card .card-sub,
.total-card .card-amount{
color:#fff;
}

.total-card .card-amount{
font-size:18px;
}

/* ===== MODAL ===== */

.overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
}

.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
max-width:620px;
background:#fff;
border-radius:18px;
padding:14px;
}

</style>
</head>

<body>

<div class="page">

<h1 class="title">Lap Target Goal</h1>
<div class="subtitle">Enter commission goal</div>

<div class="target-card">
<input id="targetAmount"
class="target-input"
type="number"
placeholder="0">
</div>

<!-- CENTERED CTA -->
<div class="cta-wrapper">
<button class="btn-primary"
onclick="calculateTarget()">
Calculate Target
</button>
</div>

</div>

<div class="overlay" id="overlay"
onclick="closePopup()"></div>

<div class="modal" id="resultModal">

<h2 style="text-align:center">
Required Lap Targets
</h2>

<div id="summaryList"></div>

</div>

<script>

/* ================= PAYOUT ================= */

const PAYOUT={
MNP:234,
SIM:132,
HOME:100
};

/* ================= SELL & WIN ================= */

function getSellWinRate(mnp){

if(mnp>=10) return 110;
if(mnp>=3)  return 90;
if(mnp>=1)  return 50;

return 0;
}

/* ================= RATIO SOLVER ================= */

function solveByRatio(target){

const x=0.75;
const y=0.15;
const z=0.10;

let N=1;

while(true){

const mnp=Math.ceil(N*x);
const sim=Math.ceil(N*y);
const home=Math.ceil(N*z);

const sellRate=getSellWinRate(mnp);

const baseEarn=
(mnp*PAYOUT.MNP)+
(sim*PAYOUT.SIM)+
(home*PAYOUT.HOME);

const sellWinEarn=mnp*sellRate;

const totalEarn=baseEarn+sellWinEarn;

if(totalEarn>=target){

return{
mnp,
sim,
home,
sellRate,
sellWinEarn,
totalEarn
};
}

N++;
}
}

/* ================= UI ================= */

function renderCard(title,value,sub,className=""){
return `
<div class="summary-card ${className}">
<div>
<div class="card-title">${title}</div>
<div class="card-sub">${sub}</div>
</div>
<div class="card-amount">${value}</div>
</div>`;
}

function openPopup(){
overlay.style.display="block";
resultModal.style.display="block";
}

function closePopup(){
overlay.style.display="none";
resultModal.style.display="none";
}

/* ================= MAIN ================= */

function calculateTarget(){

const target=parseInt(targetAmount.value)||0;
if(target<=0)return;

const r=solveByRatio(target);

summaryList.innerHTML="";

summaryList.innerHTML+=renderCard(
"MNP (₹349)",
r.mnp,
`${r.mnp} × ₹234`
);

summaryList.innerHTML+=renderCard(
"New SIM",
r.sim,
`${r.sim} × ₹132`
);

summaryList.innerHTML+=renderCard(
"JioHome Booking",
r.home,
`${r.home} × ₹100`
);

summaryList.innerHTML+=renderCard(
"Sell & Win Commission",
`₹${r.sellWinEarn}`,
`${r.mnp} × ₹${r.sellRate}`,
"bonus-card"
);

summaryList.innerHTML+=renderCard(
"Total Estimated Earning",
`₹${r.totalEarn}`,
"Close to Target",
"total-card"
);

openPopup();
}

</script>

</body>
</html>
