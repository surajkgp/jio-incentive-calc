<!-- VERSION C32.9 – Reverse (60% MNP + 20% New SIM + 20% JioHome) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jio Retailer – Reverse Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- html2canvas -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9GH8905Y6B"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-9GH8905Y6B');
</script>

<style>
/* (UI remains same as C32.8 – unchanged for stability) */
body{margin:0;font-family:Inter,sans-serif;background:#fff;color:#202124;}
.page{max-width:820px;margin:auto;padding:14px 14px 90px;}
.title{text-align:center;font-size:26px;font-weight:900;color:#002d62;}
.subtitle{text-align:center;font-size:13px;color:#5f6368;}
.divider{border:none;border-top:1px solid #eef0f3;margin:14px 0;}

.target-card{text-align:center;border:1px solid #eef0f3;border-radius:18px;padding:16px;}
.target-label{font-size:12px;font-weight:800;color:#94a3b8;}
.target-input{margin-top:10px;width:220px;height:56px;font-size:32px;font-weight:900;text-align:center;border-radius:16px;border:1px solid #dadce0;background:#f8f9fa;}
.target-input:focus{outline:none;border-color:#005eff;}

.error{font-size:12px;color:#d93025;min-height:16px;}

.actions{text-align:center;margin-top:14px;}
.btn-primary{width:100%;max-width:360px;height:52px;border:none;border-radius:14px;font-size:17px;font-weight:900;color:#fff;background:linear-gradient(90deg,#005eff,#003bba);cursor:pointer;}

.live-feed{margin:12px auto;max-width:520px;display:flex;gap:8px;align-items:center;padding:10px;border:1px solid #eef2f6;border-radius:14px;}
.live-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;}
.live-text{font-size:12.5px;font-weight:700;color:#64748b;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:92%;max-width:620px;background:#fff;border-radius:18px;padding:12px;z-index:101;}

.modal-title{text-align:center;font-size:22px;font-weight:900;color:#002d62;}
.modal-subtitle{text-align:center;font-size:12px;color:#5f6368;margin-bottom:10px;}

.summary-card{display:flex;justify-content:space-between;align-items:center;background:#f7fafc;border:1px solid #eef2f6;border-radius:14px;padding:10px;margin-bottom:8px;}
.card-title{font-size:13.5px;font-weight:800;}
.card-sub{font-size:11px;color:#94a3b8;}
.card-amount{font-weight:900;color:#002d62;}

.download-btn{width:100%;max-width:260px;height:44px;border:none;border-radius:14px;background:linear-gradient(90deg,#005eff,#003bba);color:#fff;font-weight:900;cursor:pointer;}
</style>
</head>

<body>

<div class="page">

<h1 class="title">Lap Target Goal</h1>
<div class="subtitle">Enter your commission goal and get targets</div>

<hr class="divider">

<div class="target-card">
<div class="target-label">Lap Commission Goal (₹)</div>
<input id="targetAmount" class="target-input" type="number" min="0" placeholder="0">
<div class="error" id="errTarget"></div>
</div>

<div class="actions">
<button class="btn-primary" onclick="calculateTarget()">Calculate Target</button>
</div>

<div class="live-feed">
<div class="live-dot"></div>
<div class="live-text" id="liveText">Setting targets...</div>
</div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="modal" id="resultModal">

<h2 class="modal-title">Required Lap Targets</h2>
<div class="modal-subtitle">Based on your commission goal</div>

<div id="summaryList"></div>

<div style="text-align:center;margin-top:12px;">
<button class="download-btn" onclick="downloadTargetImage()">Download as Image</button>
</div>

</div>

<script>

/* =========================
   PAYOUT CONFIG
========================= */

const PAYOUT = {
  MNP: 234,
  SIM: 132,
  JIOHOME: 100
};


/* =========================
   HELPERS
========================= */

function ceilDiv(amount, rate){
  if(amount<=0) return 0;
  return Math.ceil(amount/rate);
}

function getTarget(){
  return parseInt(document.getElementById("targetAmount").value) || 0;
}

function renderCard(title, qty, rate, unit){
  return `
  <div class="summary-card">
    <div>
      <div class="card-title">${title}</div>
      <div class="card-sub">${qty} × ₹${rate} / ${unit}</div>
    </div>
    <div class="card-amount">${qty}</div>
  </div>`;
}


/* =========================
   POPUP CONTROL
========================= */

function openPopup(){
  overlay.style.display="block";
  resultModal.style.display="block";
}

function closePopup(){
  overlay.style.display="none";
  resultModal.style.display="none";
}


/* =========================
   CORE REVERSE ENGINE
========================= */

function calculateTarget(){

  const target = getTarget();
  const err = document.getElementById("errTarget");
  err.innerText="";

  if(target<=0){
    err.innerText="Enter valid target amount";
    return;
  }

  if(typeof gtag==="function"){
    gtag('event','reverse_calculate_clicked',{
      event_category:'ReverseCalculator',
      event_label:'Lap Target Goal'
    });
  }

  /* Allocation: 60 / 20 / 20 */

  const mnpBucket     = target * 0.75;
  const simBucket     = target * 0.15;
  const jiohomeBucket = target * 0.10;

  const mnpCount     = ceilDiv(mnpBucket, PAYOUT.MNP);
  const simCount     = ceilDiv(simBucket, PAYOUT.SIM);
  const jiohomeCount = ceilDiv(jiohomeBucket, PAYOUT.JIOHOME);

  const list = document.getElementById("summaryList");
  list.innerHTML="";

  list.innerHTML += renderCard("MNP (₹349)", mnpCount, PAYOUT.MNP, "MNP");
  list.innerHTML += renderCard("New SIM (₹349)", simCount, PAYOUT.SIM, "SIM");
  list.innerHTML += renderCard("JioHome Booking", jiohomeCount, PAYOUT.JIOHOME, "Booking");

  openPopup();
}


/* =========================
   DOWNLOAD IMAGE
========================= */

function downloadTargetImage(){

  const modal = document.getElementById("resultModal");

  html2canvas(modal).then(canvas=>{

    const link = document.createElement("a");
    link.download="lap-target-summary.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

  });
}


/* =========================
   INPUT HYGIENE
========================= */

document.getElementById("targetAmount").addEventListener("input",e=>{

  let v = e.target.value;

  if(v.includes(".")){
    e.target.value = Math.floor(v);
  }

  if(Number(v)<0){
    e.target.value=0;
  }

  errTarget.innerText="";

});


/* =========================
   LIVE FEED (UNCHANGED)
========================= */

const names=["Amit","Ravi","Kunal","Rakesh","Sourav","Mahesh"];
const amounts=[2600,2800,3000,3200,3500,3800,4000];

function startLiveFeed(){

  const el=document.getElementById("liveText");

  setInterval(()=>{

    const n=names[Math.floor(Math.random()*names.length)];
    const a=amounts[Math.floor(Math.random()*amounts.length)];

    el.innerText = `${n} set ₹${a.toLocaleString("en-IN")} as lap target`;

  },4500);

}

startLiveFeed();

</script>

</body>
</html>
