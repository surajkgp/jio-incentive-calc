<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jio Retailer – Reverse Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#ffffff;
color:#202124;
}

.page{
max-width:820px;
margin:auto;
padding:16px 14px 90px;
}

.title{
text-align:center;
font-size:26px;
font-weight:900;
color:#002d62;
}

.subtitle{
text-align:center;
font-size:13px;
color:#5f6368;
}

/* INPUT */

.target-card{
text-align:center;
border:1px solid #eef0f3;
border-radius:18px;
padding:18px;
margin-top:10px;
}

.target-input{
width:220px;
height:56px;
font-size:32px;
font-weight:900;
text-align:center;
border-radius:16px;
border:1px solid #dadce0;
}

/* CTA CENTER */

.cta-wrapper{
display:flex;
justify-content:center;
margin-top:18px;
}

.btn-primary{
width:100%;
max-width:360px;
height:52px;
border:none;
border-radius:14px;
font-size:17px;
font-weight:900;
color:#fff;
background:linear-gradient(90deg,#005eff,#003bba);
cursor:pointer;
}

/* RESULT CARDS */

.summary-card{
display:flex;
justify-content:space-between;
align-items:center;
background:#f7fafc;
border:1px solid #eef2f6;
border-radius:14px;
padding:12px;
margin-bottom:10px;
}

.card-title{
font-weight:800;
}

.card-sub{
font-size:12px;
color:#64748b;
margin-top:2px;
}

.card-amount{
font-weight:900;
color:#002d62;
}

/* MODAL */

.overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
}

.modal{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:92%;
max-width:620px;
background:#fff;
border-radius:18px;
padding:16px;
}

</style>
</head>

<body>

<div class="page">

<h1 class="title">Lap Target Goal</h1>
<div class="subtitle">Enter commission goal</div>

<div class="target-card">
<input id="targetAmount"
class="target-input"
type="number"
placeholder="0">
</div>

<div class="cta-wrapper">
<button class="btn-primary"
onclick="calculateTarget()">
Calculate Target
</button>
</div>

</div>

<div class="overlay" id="overlay"
onclick="closePopup()"></div>

<div class="modal" id="resultModal">

<h2 style="text-align:center;margin-bottom:12px;">
Required Lap Targets
</h2>

<div id="summaryList"></div>

</div>

<script>

/* ================= PAYOUT ================= */

const PAYOUT={
MNP:234,
SIM:132,
HOME:100
};

/* ================= SELL & WIN ================= */

function getSellWinRate(mnp){

if(mnp>=10) return 110;
if(mnp>=3)  return 90;
if(mnp>=1)  return 50;

return 0;
}

/* ================= RATIO SOLVER ================= */

function solveByRatio(target){

const x=0.75;
const y=0.15;
const z=0.10;

let N=1;

while(true){

const mnp=Math.ceil(N*x);
const sim=Math.ceil(N*y);
const home=Math.ceil(N*z);

const bonusRate=getSellWinRate(mnp);

const earning=
(mnp*PAYOUT.MNP)+
(sim*PAYOUT.SIM)+
(home*PAYOUT.HOME)+
(mnp*bonusRate);

if(earning>=target){

return{
mnp,
sim,
home,
bonusRate
};
}

N++;
}
}

/* ================= UI ================= */

function renderCard(title,value,sub){

return `
<div class="summary-card">
<div>
<div class="card-title">${title}</div>
<div class="card-sub">${sub}</div>
</div>
<div class="card-amount">${value}</div>
</div>`;
}

function openPopup(){
overlay.style.display="block";
resultModal.style.display="block";
}

function closePopup(){
overlay.style.display="none";
resultModal.style.display="none";
}

/* ================= MAIN ================= */

function calculateTarget(){

const target=parseInt(targetAmount.value)||0;
if(target<=0)return;

const r=solveByRatio(target);

summaryList.innerHTML="";

/* MNP ACTIVATION */

let mnpLine=
`OTF – ${r.mnp} × ₹234`;

if(r.bonusRate>0){
mnpLine+=`  |  Bonus – ${r.mnp} × ₹${r.bonusRate}`;
}

summaryList.innerHTML+=renderCard(
"MNP Activation",
r.mnp,
mnpLine
);

/* NEW SIM */

summaryList.innerHTML+=renderCard(
"New SIM",
r.sim,
`${r.sim} × ₹132`
);

/* JIOHOME */

summaryList.innerHTML+=renderCard(
"JioHome Booking",
r.home,
`${r.home} × ₹100`
);

openPopup();
}

</script>

</body>
</html>
