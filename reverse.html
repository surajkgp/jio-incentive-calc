<!-- VERSION C33 – Ratio Respecting Reverse Calculator -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jio Retailer – Reverse Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9GH8905Y6B"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config','G-9GH8905Y6B');
</script>

<style>
body{margin:0;font-family:Inter;background:#fff;color:#202124;}
.page{max-width:820px;margin:auto;padding:14px 14px 90px;}
.title{text-align:center;font-size:26px;font-weight:900;color:#002d62;}
.subtitle{text-align:center;font-size:13px;color:#5f6368;}
.divider{border:none;border-top:1px solid #eef0f3;margin:14px 0;}

.target-card{text-align:center;border:1px solid #eef0f3;border-radius:18px;padding:16px;}
.target-label{font-size:12px;font-weight:800;color:#94a3b8;}
.target-input{margin-top:10px;width:220px;height:56px;font-size:32px;font-weight:900;text-align:center;border-radius:16px;border:1px solid #dadce0;background:#f8f9fa;}
.target-input:focus{outline:none;border-color:#005eff;}

.error{font-size:12px;color:#d93025;min-height:16px;}

.actions{text-align:center;margin-top:14px;}
.btn-primary{width:100%;max-width:360px;height:52px;border:none;border-radius:14px;font-size:17px;font-weight:900;color:#fff;background:linear-gradient(90deg,#005eff,#003bba);cursor:pointer;}

.live-feed{margin:12px auto;max-width:520px;display:flex;gap:8px;align-items:center;padding:10px;border:1px solid #eef2f6;border-radius:14px;}
.live-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;}
.live-text{font-size:12.5px;font-weight:700;color:#64748b;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;}
.modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
width:92%;max-width:620px;background:#fff;border-radius:18px;padding:12px;z-index:101;}

.modal-title{text-align:center;font-size:22px;font-weight:900;color:#002d62;}
.modal-subtitle{text-align:center;font-size:12px;color:#5f6368;margin-bottom:10px;}

.summary-card{display:flex;justify-content:space-between;
background:#f7fafc;border:1px solid #eef2f6;border-radius:14px;
padding:10px;margin-bottom:8px;}

.card-title{font-size:13.5px;font-weight:800;}
.card-sub{font-size:11px;color:#94a3b8;}
.card-amount{font-weight:900;color:#002d62;}

.download-btn{width:100%;max-width:260px;height:44px;border:none;
border-radius:14px;background:linear-gradient(90deg,#005eff,#003bba);
color:#fff;font-weight:900;cursor:pointer;}
</style>
</head>

<body>

<div class="page">

<h1 class="title">Lap Target Goal</h1>
<div class="subtitle">Enter your commission goal and get targets</div>

<hr class="divider">

<div class="target-card">
<div class="target-label">Lap Commission Goal (₹)</div>
<input id="targetAmount" class="target-input" type="number" min="0" placeholder="0">
<div class="error" id="errTarget"></div>
</div>

<div class="actions">
<button class="btn-primary" onclick="calculateTarget()">Calculate Target</button>
</div>

<div class="live-feed">
<div class="live-dot"></div>
<div class="live-text" id="liveText">Setting targets...</div>
</div>

</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="modal" id="resultModal">
<h2 class="modal-title">Required Lap Targets</h2>
<div class="modal-subtitle">Ratio Respecting (75-15-10)</div>
<div id="summaryList"></div>

<div style="text-align:center;margin-top:12px;">
<button class="download-btn" onclick="downloadTargetImage()">Download as Image</button>
</div>
</div>

<script>

/* ================= PAYOUT ================= */

const PAYOUT={
MNP:234,
SIM:132,
JIOHOME:100
};

/* ================= RATIO ================= */

const TARGET_RATIO={MNP:0.75,SIM:0.15,HOME:0.10};
const RATIO_TOL=0.03;

/* ================= BONUS ================= */

function getFRBonus(mnp){
return (mnp>=5)?mnp*10:0;
}

function getSellWinBonus(mnp){
if(mnp>=10)return mnp*110;
if(mnp>=3)return mnp*90;
if(mnp>=1)return mnp*50;
return 0;
}

function totalMNPEarning(mnp){
return (mnp*PAYOUT.MNP)
+getFRBonus(mnp)
+getSellWinBonus(mnp);
}

/* ================= SOLVER ================= */

function solveRatioRespecting(target){

let mnp=0;
let mnpEarn=0;

const targetMNPEarn=target*TARGET_RATIO.MNP;

while(mnpEarn<targetMNPEarn){
mnp++;
mnpEarn=totalMNPEarning(mnp);
}

const remaining=Math.max(target-mnpEarn,0);

let sim=Math.ceil(
(remaining*TARGET_RATIO.SIM)/PAYOUT.SIM);

let home=Math.ceil(
(remaining*TARGET_RATIO.HOME)/PAYOUT.JIOHOME);

const simEarn=sim*PAYOUT.SIM;
const homeEarn=home*PAYOUT.JIOHOME;

const totalEarn=mnpEarn+simEarn+homeEarn;

const ratio=mnpEarn/totalEarn;

if(ratio>TARGET_RATIO.MNP+RATIO_TOL)home++;
if(ratio<TARGET_RATIO.MNP-RATIO_TOL)sim++;

return{mnp,sim,home,totalEarn};
}

/* ================= UI ================= */

function renderCard(t,q,sub){
return`
<div class="summary-card">
<div>
<div class="card-title">${t}</div>
<div class="card-sub">${sub}</div>
</div>
<div class="card-amount">${q}</div>
</div>`;
}

function openPopup(){
overlay.style.display="block";
resultModal.style.display="block";
}
function closePopup(){
overlay.style.display="none";
resultModal.style.display="none";
}

/* ================= MAIN ================= */

function calculateTarget(){

const target=parseInt(targetAmount.value)||0;
errTarget.innerText="";

if(target<=0){
errTarget.innerText="Enter valid target";
return;
}

gtag?.('event','reverse_calculate_clicked');

const r=solveRatioRespecting(target);

const mnpEarn=totalMNPEarning(r.mnp);
const fr=getFRBonus(r.mnp);
const sw=getSellWinBonus(r.mnp);

summaryList.innerHTML="";

summaryList.innerHTML+=renderCard(
"MNP (₹349)",
r.mnp,
`Base+Bonus → ₹${mnpEarn}`);

summaryList.innerHTML+=renderCard(
"FR MNP Bonus",
`₹${fr}`,
"₹10 per MNP ≥5");

summaryList.innerHTML+=renderCard(
"Sell & Win Bonus",
`₹${sw}`,
"Slab incentive");

summaryList.innerHTML+=renderCard(
"New SIM",
r.sim,
`${r.sim} × ₹132`);

summaryList.innerHTML+=renderCard(
"JioHome Booking",
r.home,
`${r.home} × ₹100`);

openPopup();
}

/* ================= DOWNLOAD ================= */

function downloadTargetImage(){
html2canvas(resultModal).then(canvas=>{
const link=document.createElement("a");
link.download="lap-target.png";
link.href=canvas.toDataURL();
link.click();
});
}

/* ================= LIVE FEED ================= */

const names=["Amit","Ravi","Kunal","Rakesh","Sourav","Mahesh"];
const amounts=[2600,2800,3000,3500,4000];

setInterval(()=>{
liveText.innerText=
`${names[Math.floor(Math.random()*6)]}
set ₹${amounts[Math.floor(Math.random()*5)].toLocaleString("en-IN")} as lap target`;
},4500);

</script>
</body>
</html>
